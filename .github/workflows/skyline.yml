name: Generate Skyline

on:
  schedule:
    - cron: "0 0 1 * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install gh-skyline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install github/gh-skyline

      - name: Generate skyline model
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p skyline
          gh skyline --user GratiaManullang03 --full --output skyline/contributions-skyline.stl

      - name: Install renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad xvfb

      - name: Render skyline to PNG
        run: |
          echo 'color([0.545,0.361,0.965]) import("skyline/contributions-skyline.stl");' > /tmp/render.scad
          xvfb-run -a openscad \
            -o skyline/contributions-skyline.png \
            --autocenter --viewall \
            --imgsize=1920,1080 \
            --camera=0,0,0,55,0,25,0 \
            --colorscheme="Tomorrow Night" \
            /tmp/render.scad

      - name: Commit skyline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skyline/contributions-skyline.stl skyline/contributions-skyline.png
          git commit -m "chore: update contribution skyline" || echo "no changes to commit"
          git push
