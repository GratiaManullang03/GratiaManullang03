name: Generate Skyline

on:
  schedule:
    - cron: "0 0 1 * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gh-skyline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install github/gh-skyline

      - name: Generate skyline model
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p skyline
          gh skyline --user GratiaManullang03 --full --output skyline/contributions-skyline.stl

      - name: Render skyline to PNG
        run: |
          pip install numpy-stl matplotlib
          python scripts/render_skyline.py

      - name: Commit skyline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skyline/contributions-skyline.stl skyline/contributions-skyline.png
          git commit -m "chore: update contribution skyline" || echo "no changes to commit"
          git push
